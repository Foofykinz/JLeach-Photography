<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Authenticating...</title>
  </head>
  <body>
    <script>
      var token = new URLSearchParams(window.location.hash.slice(1)).get('access_token');

      if (token && window.opener) {
        try {
          // Same-origin: write directly to the admin window's sessionStorage.
          // admin/index.html polls for this and posts to itself so Decap receives it.
          var payload = JSON.stringify({ token: token, provider: 'github' });
          window.opener.sessionStorage.setItem('oauth_token', payload);
          document.body.textContent = 'Authenticated. Closing...';
        } catch (e) {
          document.body.textContent = 'Error: ' + e.message;
        }
      } else {
        document.body.textContent = 'Error: ' + (!token ? 'no token in hash' : 'no opener');
      }

      setTimeout(function () { window.close(); }, 800);
    </script>
  </body>
</html>
