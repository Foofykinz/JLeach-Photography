<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JLeach Photography — Admin</title>
  </head>
  <body>
    <div id="nc-root"></div>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      // ─── Auto-compress images before Decap uploads them to GitHub ────────────
      //
      // Why: Cloudflare Pages hard-rejects files over 25 MB, failing the whole
      // deployment. Raw camera exports are typically 10–40 MB. This compresses
      // every uploaded image to max 2400 px on the longest side at JPEG 90%
      // quality — visually indistinguishable from the original on any screen,
      // but reliably under 3 MB.
      //
      // How: A MutationObserver watches for file inputs Decap renders, attaches
      // a capture-phase handler (fires before Decap's own handler), compresses
      // the image in-browser via Canvas, swaps the file list, then re-fires the
      // event so Decap proceeds normally with the smaller file.

      var MAX_PX     = 2400;   // max width or height — covers 4K retina
      var QUALITY    = 0.90;   // JPEG quality: 90% is near-lossless for photos
      var SKIP_BELOW = 5 * 1024 * 1024; // skip files already under 5 MB (not PNG)

      function compressImage(file) {
        return new Promise(function (resolve) {
          // Already small and not a PNG — pass through untouched
          if (file.size <= SKIP_BELOW && file.type !== 'image/png') {
            return resolve(file);
          }

          var reader = new FileReader();
          reader.onerror = function () { resolve(file); }; // fallback: keep original
          reader.onload = function (ev) {
            var img = new Image();
            img.onerror = function () { resolve(file); }; // fallback: keep original
            img.onload = function () {
              var w = img.width;
              var h = img.height;

              // Scale down proportionally if either dimension exceeds MAX_PX
              if (w > MAX_PX || h > MAX_PX) {
                var ratio = Math.min(MAX_PX / w, MAX_PX / h);
                w = Math.round(w * ratio);
                h = Math.round(h * ratio);
              }

              var canvas = document.createElement('canvas');
              canvas.width  = w;
              canvas.height = h;
              canvas.getContext('2d').drawImage(img, 0, 0, w, h);

              canvas.toBlob(function (blob) {
                if (!blob) return resolve(file); // canvas failed — keep original

                // If compression made it larger somehow, keep the original
                if (blob.size >= file.size) return resolve(file);

                var name = file.name.replace(/\.[^.]+$/, '') + '.jpg';
                resolve(new File([blob], name, {
                  type: 'image/jpeg',
                  lastModified: Date.now(),
                }));
              }, 'image/jpeg', QUALITY);
            };
            img.src = ev.target.result;
          };
          reader.readAsDataURL(file);
        });
      }

      // Track re-dispatched events so we don't compress twice
      var seen = new WeakSet();

      new MutationObserver(function () {
        document.querySelectorAll('input[type="file"]:not([data-cc])').forEach(function (input) {
          input.setAttribute('data-cc', '1');

          // Capture phase — fires before Decap's bubble-phase handler
          input.addEventListener('change', async function (e) {
            if (seen.has(e)) return; // already processed — let Decap handle it

            var files = Array.from(e.target.files);
            if (!files.length) return;

            // Stop Decap from reading the original (large) files
            e.stopImmediatePropagation();

            // Compress all selected files (usually just one)
            var compressed = await Promise.all(files.map(compressImage));

            // Swap the input's file list for the compressed versions
            var dt = new DataTransfer();
            compressed.forEach(function (f) { dt.items.add(f); });
            e.target.files = dt.files;

            // Re-fire so Decap picks up the compressed file list
            var next = new Event('change', { bubbles: true });
            seen.add(next);
            input.dispatchEvent(next);
          }, true);
        });
      }).observe(document.body, { childList: true, subtree: true });
    </script>
  </body>
</html>
